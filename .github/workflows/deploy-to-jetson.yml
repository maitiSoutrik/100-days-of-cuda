name: Deploy to Jetson Nano

on:
  push:
    branches: [ development, main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key and test connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JETSON_SSH_KEY }}" > ~/.ssh/jetson_ci_key
          chmod 600 ~/.ssh/jetson_ci_key
          
          # Network diagnostics
          echo "Running network diagnostics..."
          ping -c 4 192.168.1.184 || echo "Ping failed but continuing..."
          
          # Add host key with increased timeout
          echo "Adding host key..."
          ssh-keyscan -H -T 10 192.168.1.184 >> ~/.ssh/known_hosts || echo "ssh-keyscan failed but continuing..."
          
          # Test SSH connection with retries
          echo "Testing SSH connection with retries..."
          max_retries=5
          retry_count=0
          connected=false
          
          while [ $retry_count -lt $max_retries ] && [ "$connected" = false ]; do
            echo "SSH connection attempt $((retry_count+1))/$max_retries"
            if ssh -v -i ~/.ssh/jetson_ci_key -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o BatchMode=yes drboom@192.168.1.184 echo "SSH connection successful"; then
              connected=true
              echo "SSH connection established successfully!"
            else
              echo "SSH connection attempt failed. Retrying in 10 seconds..."
              sleep 10
              retry_count=$((retry_count+1))
            fi
          done
          
          if [ "$connected" = false ]; then
            echo "Failed to establish SSH connection after $max_retries attempts."
            exit 1
          fi

      - name: Deploy to Jetson Nano
        run: |
          # Create a deployment script with improved error handling
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          # Exit on error, but add retry logic for network operations
          set -e

          # Define variables
          REPO_DIR="/home/drboom/git_repos/100-days-of-cuda"
          BUILD_DIR="${REPO_DIR}/build"
          
          # Create repository directory if it doesn't exist
          if [ ! -d "${REPO_DIR}" ]; then
            echo "Creating repository directory..."
            mkdir -p "${REPO_DIR}"
            cd "${REPO_DIR}"
            git clone https://github.com/maitiSoutrik/100-days-of-cuda.git .
          else
            # Update repository
            echo "Updating repository..."
            cd "${REPO_DIR}"
            git fetch
            git pull origin development
          fi
          
          # Create build directory if it doesn't exist
          mkdir -p "${BUILD_DIR}"
          
          # Ensure image files are copied to the build directory
          echo "Copying image files to build directory..."
          find "${REPO_DIR}" -name "*.png" -o -name "*.jpg" | while read img_file; do
            img_dir=$(dirname "${img_file}")
            rel_path=$(realpath --relative-to="${REPO_DIR}" "${img_dir}")
            target_dir="${BUILD_DIR}/${rel_path}"
            mkdir -p "${target_dir}"
            cp "${img_file}" "${target_dir}/"
            echo "Copied ${img_file} to ${target_dir}/"
          done
          
          # Build the latest day's code
          echo "Building latest code..."
          cd "${BUILD_DIR}"
          cmake ..
          
          # Create logs directory if it doesn't exist
          LOGS_DIR="${REPO_DIR}/logs"
          mkdir -p "${LOGS_DIR}"
          
          # Build and run all days' code
          echo "Building and running all days..."
          
          # First, build all projects
          echo "Building all projects..."
          cd "${BUILD_DIR}"
          cmake --build .
          
          # Get all day directories
          DAY_DIRS=$(ls -d ${REPO_DIR}/day* | sort -V)
          
          # Process each day directory
          for DAY in $DAY_DIRS; do
            DAY_NAME=$(basename "${DAY}")
            BUILD_DAY_DIR="${BUILD_DIR}/${DAY_NAME}"
            
            # Check if the build directory exists
            if [ -d "${BUILD_DAY_DIR}" ]; then
              echo "\n===== Processing ${DAY_NAME} =====\n"
              
              # Find all executable files in the directory
              cd "${BUILD_DAY_DIR}"
              EXECUTABLES=$(find . -type f -executable -not -path "*/\.*" | sort)
              
              # Run each executable and capture output
              for EXEC in $EXECUTABLES; do
                EXEC_NAME=$(basename "${EXEC}")
                echo "Running ${EXEC_NAME}..."
                LOG_FILE="${LOGS_DIR}/${DAY_NAME}_${EXEC_NAME}.log"
                
                # Run the executable and capture both stdout and stderr
                ${EXEC} > "${LOG_FILE}" 2>&1
                
                # Print the first few lines of output
                echo "Output preview (see ${LOG_FILE} for full output):"
                head -n 20 "${LOG_FILE}"
                echo ""
              done
            else
              echo "Skipping ${DAY_NAME} - no build directory found"
            fi
          done
          
          echo "Deployment complete! All binaries have been built and run."
          echo "Logs are available in ${LOGS_DIR}"
          EOL
          
          # Copy and execute the deployment script on the Jetson Nano with retry logic
          chmod +x deploy.sh
          
          # Function to retry commands
          retry_command() {
            local cmd="$1"
            local max_attempts=5
            local attempt=1
            local delay=10
            
            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt/$max_attempts: $cmd"
              if eval $cmd; then
                echo "Command succeeded!"
                return 0
              else
                echo "Command failed. Retrying in $delay seconds..."
                sleep $delay
                attempt=$((attempt+1))
                delay=$((delay+5))
              fi
            done
            
            echo "Command failed after $max_attempts attempts."
            return 1
          }
          
          # Copy deployment script with retry
          echo "Copying deployment script to Jetson Nano..."
          retry_command "scp -o ConnectTimeout=20 -i ~/.ssh/jetson_ci_key deploy.sh drboom@192.168.1.184:~/deploy.sh"
          
          # Execute deployment script with retry
          echo "Executing deployment script on Jetson Nano..."
          retry_command "ssh -o ConnectTimeout=20 -i ~/.ssh/jetson_ci_key drboom@192.168.1.184 \"chmod +x ~/deploy.sh && ~/deploy.sh && rm ~/deploy.sh\""
