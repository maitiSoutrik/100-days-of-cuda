name: Deploy to Jetson Nano

on:
  push:
    branches: [ development, main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JETSON_SSH_KEY }}" > ~/.ssh/jetson_ci_key_nopass
          chmod 600 ~/.ssh/jetson_ci_key_nopass
          ssh-keyscan -H 192.168.1.184 >> ~/.ssh/known_hosts
          # Test SSH connection
          ssh -i ~/.ssh/jetson_ci_key_nopass -o StrictHostKeyChecking=no -o BatchMode=yes drboom@192.168.1.184 echo "SSH connection successful" || { echo "SSH connection failed"; exit 1; }

      - name: Deploy to Jetson Nano
        run: |
          # Create a deployment script
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          set -e

          # Define variables
          REPO_DIR="/home/drboom/git_repos/100-days-of-cuda"
          BUILD_DIR="${REPO_DIR}/build"

          # Create repository directory if it doesn't exist
          if [ ! -d "${REPO_DIR}" ]; then
            echo "Creating repository directory..."
            mkdir -p "${REPO_DIR}"
            cd "${REPO_DIR}"
            git clone https://github.com/maitiSoutrik/100-days-of-cuda.git .
          else
            # Update repository
            echo "Updating repository..."
            cd "${REPO_DIR}"
            git fetch
            git pull origin development # Or use the branch being pushed
          fi

          # Create build directory if it doesn't exist
          mkdir -p "${BUILD_DIR}"

          # Build the latest code
          echo "Building latest code..."
          cd "${BUILD_DIR}"
          cmake ..

          # Create logs directory if it doesn't exist
          LOGS_DIR="${REPO_DIR}/logs"
          mkdir -p "${LOGS_DIR}"

          # Build and run all days' code
          # First, build all projects
          echo "Building all projects..."
          cd "${BUILD_DIR}"
          cmake --build . # Build all targets

          # --- Build and Run ONLY Day 45 ---
          DAY_NAME="day045" # Explicitly set the day to build/run
          BUILD_DAY_DIR="${BUILD_DIR}/${DAY_NAME}"
          LOGS_DIR="${REPO_DIR}/logs" # Ensure logs dir is defined/exists

          # Build the specific day target first
          # It's often better to build explicitly if CMake structure allows
          # Assuming 'cmake --build . --target <target_name>' works or 'cmake --build .' builds everything needed
          echo "Building Day 45 target(s)..."
          cd "${BUILD_DIR}"
          # Attempt to build just the day's target if possible, otherwise build all
          # This might need adjustment based on how targets are named in dayXXX/CMakeLists.txt
          cmake --build . # Re-building all might be necessary if dependencies aren't perfect
          # If target names are consistent like 'dayXXX_executable':
          # cmake --build . --target ${DAY_NAME}_executable || cmake --build . # Fallback

          # Check if the build directory exists for Day 45
          if [ -d "${BUILD_DAY_DIR}" ]; then
            echo "\n===== Processing ${DAY_NAME} =====\n"

            # Find all executable files in the directory
            cd "${BUILD_DAY_DIR}"
            EXECUTABLES=$(find . -type f -executable -not -path "*/\.*" | sort)

            if [ -z "$EXECUTABLES" ]; then
              echo "Warning: No executables found in ${BUILD_DAY_DIR}. Ensure Day 45 code compiles and produces an executable."
            else
              # Run each executable and capture output
              for EXEC in $EXECUTABLES; do
                EXEC_NAME=$(basename "${EXEC}")
                echo "Running ${EXEC_NAME}..."
                LOG_FILE="${LOGS_DIR}/${DAY_NAME}_${EXEC_NAME}.log"

                # Default run (Adjust if Day 45 needs specific args based on its README)
                echo "Running ${EXEC_NAME} (default)..."
                # IMPORTANT: Add specific argument handling for Day 45 if needed here
                ${EXEC} > "${LOG_FILE}" 2>&1
                RUN_STATUS=$? # Capture exit status

                if [ $RUN_STATUS -ne 0 ]; then
                  echo "Error: ${EXEC_NAME} exited with status ${RUN_STATUS}. Check log: ${LOG_FILE}"
                else
                  echo "${EXEC_NAME} completed successfully."
                fi
                sleep 5 # Basic sleep after run

                # Print the first few lines of output
                if [ -f "${LOG_FILE}" ]; then
                    echo "Output preview (see ${LOG_FILE} for full output):"
                    head -n 20 "${LOG_FILE}"
                    echo ""
                else
                    echo "Warning: Log file ${LOG_FILE} not found after running ${EXEC_NAME}."
                fi
              done # End executable loop
            fi
          else
            echo "Skipping ${DAY_NAME} - build directory ${BUILD_DAY_DIR} not found. Ensure Day 45 exists and its CMakeLists.txt is added to the root CMakeLists.txt."
          fi
          # --- End Day 45 Specific Build/Run ---

          echo "Deployment complete! All binaries have been built and run."
          echo "Logs are available in ${LOGS_DIR}"
          EOL

          # Copy and execute the deployment script on the Jetson Nano
          chmod +x deploy.sh
          scp -i ~/.ssh/jetson_ci_key_nopass deploy.sh drboom@192.168.1.184:~/deploy.sh
          ssh -i ~/.ssh/jetson_ci_key_nopass drboom@192.168.1.184 "chmod +x ~/deploy.sh && ~/deploy.sh && rm ~/deploy.sh"
