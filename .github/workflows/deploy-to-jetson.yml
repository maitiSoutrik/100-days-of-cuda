name: Deploy to Jetson Nano

on:
  push:
    branches: [ development, main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JETSON_SSH_KEY }}" > ~/.ssh/jetson_ci_key_nopass
          chmod 600 ~/.ssh/jetson_ci_key_nopass
          ssh-keyscan -H 192.168.1.184 >> ~/.ssh/known_hosts
          # Test SSH connection
          ssh -i ~/.ssh/jetson_ci_key_nopass -o StrictHostKeyChecking=no -o BatchMode=yes drboom@192.168.1.184 echo "SSH connection successful" || { echo "SSH connection failed"; exit 1; }
          


      - name: Deploy to Jetson Nano
        run: |
          # Create a deployment script
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          set -e

          # Define variables
          REPO_DIR="/home/drboom/git_repos/100-days-of-cuda"
          BUILD_DIR="${REPO_DIR}/build"
          
          # Create repository directory if it doesn't exist
          if [ ! -d "${REPO_DIR}" ]; then
            echo "Creating repository directory..."
            mkdir -p "${REPO_DIR}"
            cd "${REPO_DIR}"
            git clone https://github.com/maitiSoutrik/100-days-of-cuda.git .
          else
            # Update repository
            echo "Updating repository..."
            cd "${REPO_DIR}"
            git fetch
            git pull origin development
          fi
          
          # Create build directory if it doesn't exist
          mkdir -p "${BUILD_DIR}"
          
          # Build the latest day's code
          echo "Building latest code..."
          cd "${BUILD_DIR}"
          cmake ..
          
          # Create logs directory if it doesn't exist
          LOGS_DIR="${REPO_DIR}/logs"
          mkdir -p "${LOGS_DIR}"
          
          # Build and run all days' code
          echo "Building and running all days..."

          # First, build only the day31 project target
          echo "Building day031 target (heat_simulation)..."
          cd "${BUILD_DIR}"
          cmake --build . --target heat_simulation

          # --- OLD CODE TO RUN ALL DAYS (Commented out for Day31 specific test) ---
          # # Get all day directories
          # DAY_DIRS=$(ls -d ${REPO_DIR}/day* | sort -V)

          # Run only day031, testing both basic and shared memory versions
          echo "\n===== Processing day031 =====\n"
          DAY_NAME="day031"
          BUILD_DAY_DIR="${BUILD_DIR}/${DAY_NAME}"
          EXEC_NAME="heat_simulation"
          EXEC_PATH="${BUILD_DAY_DIR}/${EXEC_NAME}"

          if [ -x "${EXEC_PATH}" ]; then
              # Run 1: Basic Kernel (no arguments)
              echo "Running ${EXEC_NAME} (basic kernel)..."
              LOG_FILE_BASIC="${LOGS_DIR}/${DAY_NAME}_${EXEC_NAME}_basic.log"
              "${EXEC_PATH}" > "${LOG_FILE_BASIC}" 2>&1
              echo "Output preview (basic) (see ${LOG_FILE_BASIC} for full output):"
              head -n 20 "${LOG_FILE_BASIC}"
              echo ""
              sleep 5 # Add a short sleep between runs

              # Run 2: Shared Memory Kernel ('shared' argument)
              echo "Running ${EXEC_NAME} (shared memory kernel)..."
              LOG_FILE_SHARED="${LOGS_DIR}/${DAY_NAME}_${EXEC_NAME}_shared.log"
              "${EXEC_PATH}" shared > "${LOG_FILE_SHARED}" 2>&1
              echo "Output preview (shared) (see ${LOG_FILE_SHARED} for full output):"
              head -n 20 "${LOG_FILE_SHARED}"
              echo ""

          else
              echo "Executable ${EXEC_PATH} not found or not executable."
              exit 1 # Fail the job if the specific executable isn't found
          fi

          echo "Deployment complete! All binaries have been built and run."
          echo "Logs are available in ${LOGS_DIR}"
          EOL

          # Copy and execute the deployment script on the Jetson Nano
          chmod +x deploy.sh
          scp -i ~/.ssh/jetson_ci_key_nopass deploy.sh drboom@192.168.1.184:~/deploy.sh
          ssh -i ~/.ssh/jetson_ci_key_nopass drboom@192.168.1.184 "chmod +x ~/deploy.sh && ~/deploy.sh && rm ~/deploy.sh"
