name: Deploy to Jetson Nano

on:
  push:
    branches: [ development, main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JETSON_SSH_KEY }}" > ~/.ssh/jetson_ci_key_nopass
          chmod 600 ~/.ssh/jetson_ci_key_nopass
          ssh-keyscan -H 192.168.1.184 >> ~/.ssh/known_hosts
          # Test SSH connection
          ssh -i ~/.ssh/jetson_ci_key_nopass -o StrictHostKeyChecking=no -o BatchMode=yes drboom@192.168.1.184 echo "SSH connection successful" || { echo "SSH connection failed"; exit 1; }

      - name: Deploy to Jetson Nano
        run: |
          # Create a deployment script
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          set -e

          # Define variables
          REPO_DIR="/home/drboom/git_repos/100-days-of-cuda"
          BUILD_DIR="${REPO_DIR}/build"

          # Create repository directory if it doesn't exist
          if [ ! -d "${REPO_DIR}" ]; then
            echo "Creating repository directory..."
            mkdir -p "${REPO_DIR}"
            cd "${REPO_DIR}"
            git clone https://github.com/maitiSoutrik/100-days-of-cuda.git .
          else
            # Update repository
            echo "Updating repository..."
            cd "${REPO_DIR}"
            git fetch
            git pull origin development # Or use the branch being pushed
          fi

          # Create build directory if it doesn't exist
          mkdir -p "${BUILD_DIR}"

          # Build the latest code
          echo "Building latest code..."
          cd "${BUILD_DIR}"
          cmake ..

          # Create logs directory if it doesn't exist
          LOGS_DIR="${REPO_DIR}/logs"
          mkdir -p "${LOGS_DIR}"

          # Build and run only Day 43 code (Temporary change for testing)
          echo "Building only Day 43 target (cudnn_conv_fwd)..."
          cd "${BUILD_DIR}"
          cmake --build . --target cudnn_conv_fwd -j$(nproc) || { echo "Build failed for Day 43"; exit 1; }

          echo "\n===== Processing day043 =====\n"
          BUILD_DAY_DIR="${BUILD_DIR}/day043"
          EXEC_PATH="${BUILD_DAY_DIR}/cudnn_conv_fwd"
          LOG_FILE="${LOGS_DIR}/day043_cudnn_conv_fwd.log"

          if [ -f "${EXEC_PATH}" ]; then
            echo "Running cudnn_conv_fwd..."
            cd "${BUILD_DAY_DIR}" # Ensure execution is from the correct directory if needed
            ${EXEC_PATH} > "${LOG_FILE}" 2>&1
            sleep 5 # Give it a moment

            echo "Output preview (see ${LOG_FILE} for full output):"
            head -n 30 "${LOG_FILE}" # Show a bit more output for cuDNN
            echo ""
          else
            echo "Error: Executable ${EXEC_PATH} not found after build."
            exit 1
          fi

          echo "Temporary deployment complete! Only Day 43 was built and run."
          echo "Log is available at ${LOG_FILE}"
          EOL

          # Copy and execute the deployment script on the Jetson Nano
          chmod +x deploy.sh
          scp -i ~/.ssh/jetson_ci_key_nopass deploy.sh drboom@192.168.1.184:~/deploy.sh
          ssh -i ~/.ssh/jetson_ci_key_nopass drboom@192.168.1.184 "chmod +x ~/deploy.sh && ~/deploy.sh && rm ~/deploy.sh"
