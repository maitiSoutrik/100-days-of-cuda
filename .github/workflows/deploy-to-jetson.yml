name: Deploy to Jetson Nano

on:
  push:
    branches: [ development, main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: "${{ secrets.JETSON_SSH_KEY }}"

      - name: Add Jetson to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 192.168.1.184 >> ~/.ssh/known_hosts

      - name: Deploy to Jetson Nano
        run: |
          # Create a deployment script
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          set -e

          # Define variables
          REPO_DIR="~/git_repos/100-days-of-cuda"
          BUILD_DIR="${REPO_DIR}/build"
          
          # Update repository
          echo "Updating repository..."
          cd "${REPO_DIR}"
          git fetch
          git pull origin development
          
          # Create build directory if it doesn't exist
          mkdir -p "${BUILD_DIR}"
          
          # Build the latest day's code
          echo "Building latest code..."
          cd "${BUILD_DIR}"
          cmake ..
          
          # Get the latest day directory
          LATEST_DAY=$(ls -d ${REPO_DIR}/day* | sort -V | tail -n 1)
          LATEST_DAY_NAME=$(basename "${LATEST_DAY}")
          
          # Build just the latest day's code
          echo "Building ${LATEST_DAY_NAME}..."
          make -j4 -C "${BUILD_DIR}/${LATEST_DAY_NAME}"
          
          echo "Deployment complete!"
          EOL
          
          # Copy and execute the deployment script on the Jetson Nano
          chmod +x deploy.sh
          scp deploy.sh drboom@192.168.1.184:~/deploy.sh
          ssh drboom@192.168.1.184 "chmod +x ~/deploy.sh && ~/deploy.sh && rm ~/deploy.sh"
