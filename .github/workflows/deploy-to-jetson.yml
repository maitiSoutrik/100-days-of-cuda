name: Deploy to Jetson Nano

on:
  push:
    branches: [ development, main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JETSON_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 192.168.1.184 >> ~/.ssh/known_hosts

      - name: Deploy to Jetson Nano
        run: |
          # Create a deployment script
          cat > deploy.sh << 'EOL'
          #!/bin/bash
          set -e

          # Define variables
          REPO_DIR="/home/drboom/git_repos/100-days-of-cuda"
          BUILD_DIR="${REPO_DIR}/build"
          
          # Create repository directory if it doesn't exist
          if [ ! -d "${REPO_DIR}" ]; then
            echo "Creating repository directory..."
            mkdir -p "${REPO_DIR}"
            cd "${REPO_DIR}"
            git clone https://github.com/maitiSoutrik/100-days-of-cuda.git .
          else
            # Update repository
            echo "Updating repository..."
            cd "${REPO_DIR}"
            git fetch
            git pull origin development
          fi
          
          # Create build directory if it doesn't exist
          mkdir -p "${BUILD_DIR}"
          
          # Build the latest day's code
          echo "Building latest code..."
          cd "${BUILD_DIR}"
          cmake ..
          
          # Get the latest day directory
          LATEST_DAY=$(ls -d ${REPO_DIR}/day* | sort -V | tail -n 1)
          LATEST_DAY_NAME=$(basename "${LATEST_DAY}")
          
          # Build just the latest day's code
          echo "Building ${LATEST_DAY_NAME}..."
          make -j4 -C "${BUILD_DIR}/${LATEST_DAY_NAME}"
          
          echo "Deployment complete!"
          EOL
          
          # Copy and execute the deployment script on the Jetson Nano
          chmod +x deploy.sh
          scp -i ~/.ssh/id_ed25519 deploy.sh drboom@192.168.1.184:~/deploy.sh
          ssh -i ~/.ssh/id_ed25519 drboom@192.168.1.184 "chmod +x ~/deploy.sh && ~/deploy.sh && rm ~/deploy.sh"
